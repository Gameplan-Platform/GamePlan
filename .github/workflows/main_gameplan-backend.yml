name: Build and deploy Node.js app to Azure Web App - gameplan-backend

on:
  push:
    branches:
      - main
      - gp-37-patch-messaging
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma Client
        run: pnpm --filter @gameplan/backend exec prisma generate

      - name: Build shared
        run: pnpm --filter @gameplan/shared build

      - name: Build backend
        run: pnpm --filter @gameplan/backend build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp -r packages/backend/dist deploy/dist
          cp packages/backend/package.json deploy/package.json
          cp -r packages/backend/prisma deploy/prisma
          printf '[config]\nSCM_DO_BUILD_DURING_DEPLOYMENT=true' > deploy/.deployment

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_829D26DC542542FCAC9551C3FEECA9A4 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_CF33DC1EE0604053899C28FA11036515 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_79C8DCBFFF7344649A72A46E5125F56E }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'gameplan-backend'
          slot-name: 'Production'
          package: .